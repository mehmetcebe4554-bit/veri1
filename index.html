<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gelişmiş IoT Telemetri Paneli</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .dashboard-title {
            text-align: center;
            margin-bottom: 30px;
        }
        .dashboard-title h1 {
            margin: 0;
            font-size: 2.2rem;
            color: #38bdf8;
            letter-spacing: 1px;
        }
        .status {
            font-size: 0.9rem;
            color: #4ade80;
            margin-top: 5px;
        }
        
        /* 3'lü Veri Kutuları Tasarımı */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 900px;
            margin-bottom: 40px;
        }
        @media (max-width: 768px) {
            .cards-grid {
                grid-template-columns: 1fr;
            }
        }
        .card {
            background: #1e293b;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #334155;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .card.c1 { border-top: 4px solid #38bdf8; }
        .card.c2 { border-top: 4px solid #a855f7; }
        .card.c3 { border-top: 4px solid #f43f5e; }
        
        .card h2 {
            font-size: 1rem;
            color: #94a3b8;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .card .value {
            font-size: 3rem;
            font-weight: bold;
            color: #f1f5f9;
        }
        
        /* Geçmiş Veri Tablosu Tasarımı */
        .table-container {
            width: 100%;
            max-width: 900px;
            background: #1e293b;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #334155;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .table-container h3 {
            background: #111827;
            margin: 0;
            padding: 15px 20px;
            font-size: 1.1rem;
            color: #94a3b8;
            border-bottom: 1px solid #334155;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th, td {
            padding: 12px 20px;
            font-size: 0.95rem;
        }
        th {
            background-color: #1e293b;
            color: #38bdf8;
            font-weight: 600;
            border-bottom: 2px solid #334155;
        }
        tr {
            border-bottom: 1px solid #1e293b;
        }
        tr:nth-child(even) {
            background-color: #111827;
        }
        tr:hover {
            background-color: #334155;
        }
        .text-center {
            text-align: center;
        }
    </style>
</head>
<body>

<div class="dashboard-title">
    <h1>Canlı İzleme Paneli</h1>
    <div id="durum" class="status">Veriler yükleniyor...</div>
</div>

<!-- Anlık Veri Kutuları -->
<div class="cards-grid">
    <div class="card c1">
        <h2>Veri 1 (Field 1)</h2>
        <div id="anlikField1" class="value">0</div>
    </div>
    <div class="card c2">
        <h2>Veri 2 (Field 2)</h2>
        <div id="anlikField2" class="value">0</div>
    </div>
    <div class="card c3">
        <h2>Veri 3 (Field 3)</h2>
        <div id="anlikField3" class="value">0</div>
    </div>
</div>

<!-- Son 10 Veri Tablosu -->
<div class="table-container">
    <h3>Son 10 Veri Kaydı (Geçmiş Logları)</h3>
    <table>
        <thead>
            <tr>
                <th>Tarih / Saat</th>
                <th class="text-center">Field 1</th>
                <th class="text-center">Field 2</th>
                <th class="text-center">Field 3</th>
            </tr>
        </thead>
        <tbody id="tabloGövdesi">
            <!-- JavaScript burayı otomatik dolduracak -->
        </tbody>
    </table>
</div>

<script>
    const CHANNEL_ID = "3430270"; // <-- Kendi ThingSpeak Kanal ID'nizi buraya yazın
    // feeds.json üzerinden son 10 kaydı tek seferde çekiyoruz
    const url = `https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds.json?results=10`;

    function verileriGuncelle() {
        fetch(url)
            .then(response => response.json())
            .then(data => {
                const feeds = data.feeds;
                
                if(feeds && feeds.length > 0) {
                    // 1. ANLIK DEĞERLERİ GÜNCELLE (Dizinin en son elemanı en güncel veridir)
                    const enSonKayit = feeds[feeds.length - 1];
                    
                    document.getElementById("anlikField1").innerText = enSonKayit.field1 !== null ? enSonKayit.field1 : "-";
                    document.getElementById("anlikField2").innerText = enSonKayit.field2 !== null ? enSonKayit.field2 : "-";
                    document.getElementById("anlikField3").innerText = enSonKayit.field3 !== null ? enSonKayit.field3 : "-";
                    
                    document.getElementById("durum").innerText = "Canlı Bağlantı: Aktif";
                    document.getElementById("durum").style.color = "#4ade80";

                    // 2. TABLOYU DOLDUR (En yeni veriler en üstte görünsün diye diziyi tersten dönüyoruz)
                    let tabloHTML = "";
                    for (let i = feeds.length - 1; i >= 0; i--) {
                        const kayit = feeds[i];
                        
                        // Zaman damgasını Türkiye saat formatına çeviriyoruz
                        const zaman = new Date(kayit.created_at).toLocaleString("tr-TR");
                        
                        const f1 = kayit.field1 !== null ? kayit.field1 : "-";
                        const f2 = kayit.field2 !== null ? kayit.field2 : "-";
                        const f3 = kayit.field3 !== null ? kayit.field3 : "-";
                        
                        tabloHTML += `
                            <tr>
                                <td>${zaman}</td>
                                <td class="text-center">${f1}</td>
                                <td class="text-center">${f2}</td>
                                <td class="text-center">${f3}</td>
                            </tr>
                        `;
                    }
                    document.getElementById("tabloGövdesi").innerHTML = tabloHTML;
                } else {
                    document.getElementById("durum").innerText = "Kanalda henüz hiç veri kaydı yok.";
                    document.getElementById("durum").style.color = "#fbbf24";
                }
            })
            .catch(error => {
                console.error("Hata:", error);
                document.getElementById("durum").innerText = "Veri okuma hatası!";
                document.getElementById("durum").style.color = "#f87171";
            });
    }

    // İlk açılışta çalıştır
    verileriGuncelle();
    
    // Her 5 saniyede bir paneli otomatik olarak tazele
    setInterval(verileriGuncelle, 5000);
</script>

</body>
</html>
